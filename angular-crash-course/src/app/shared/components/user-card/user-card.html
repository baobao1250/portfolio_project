<div 
  (click)="handleClick()"
  class="bg-white rounded-xl shadow-md p-6 flex items-center gap-4 w-full h-full border border-gray-100 cursor-pointer hover:shadow-lg transition-shadow"
>
  <img [src]="userInfo.avatarUrl" alt="Avatar" class="w-16 h-16 rounded-full object-cover shadow-sm">
  <div>
    <h3 class="text-lg font-bold text-gray-800">{{ userInfo.name }}</h3>
    <p class="text-sm text-gray-500 font-medium">{{ userInfo.role }}</p>
  </div>
</div>
