<button 
  (click)="toggleLike()"
  [class.bg-blue-600]="hasLiked"
  [class.bg-gray-200]="!hasLiked"
  [class.text-white]="hasLiked"
  [class.text-gray-800]="!hasLiked"
  class="px-4 py-2 rounded-md font-semibold transition-colors flex items-center gap-2 shadow-sm"
>
  <span>👍</span> 
  Like {{ likes }}
</button>
